cation layer of the network, the meaning is it\u0026#39;s job is to organize and structure data exchange\u003cbr\u003eit\u0026#39;s continued success stems from these three main factors:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eOpen and free: It is \u003cstrong\u003eopenly published\u003c/strong\u003e and \u003cstrong\u003eroyalty-free\u003c/strong\u003e, making it easy for any manufacturer to adopt.\u003c/li\u003e\n\u003cli\u003eIt\u0026#39;s relatively easy to deploy and maintain compared to newer, more complex industrial protocols.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVersatility:\u003c/strong\u003e It places few restrictions on data format, making it flexible for everything from reading a single relay status to logging complex measurements.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIt fundamentally operates on a \u003cstrong\u003eClient/Server\u003c/strong\u003e principle (formerly Master/Slave), where a central \u003cstrong\u003eClient/Master\u003c/strong\u003e (e.g., a supervisory computer, data logger) initiates a transaction to request data or command an action from a \u003cstrong\u003eServer/Slave\u003c/strong\u003e (e.g., a sensor or PLC).\u003c/p\u003e\n\u003ch2 id=\"the-two-dominant-flavors-rtu-vs-tcp\"\u003eThe Two Dominant Flavors: RTU vs. TCP\u003c/h2\u003e\n\u003cp\u003eWhile the core data model remains the same, Modbus is deployed over two very different physical transports:\u003c/p\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth align=\"left\"\u003e\u003cstrong\u003eFeature\u003c/strong\u003e\u003c/th\u003e\n\u003cth align=\"left\"\u003e\u003cstrong\u003eModbus RTU (Remote Terminal Unit)\u003c/strong\u003e\u003c/th\u003e\n\u003cth align=\"left\"\u003e\u003cstrong\u003eModbus TCP (Transmission Control Protocol)\u003c/strong\u003e\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\u003ctr\u003e\n\u003ctd align=\"left\"\u003eTransport\u003c/td\u003e\n\u003ctd align=\"left\"\u003e\u003cstrong\u003eSerial\u003c/strong\u003e communication (e.g., RS-448/RS-232).\u003c/td\u003e\n\u003ctd align=\"left\"\u003e\u003cstrong\u003eEthernet\u003c/strong\u003e (TCP/IP network).\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd align=\"left\"\u003eFraming\u003c/td\u003e\n\u003ctd align=\"left\"\u003eBinary, compact, suitable for low-speed lines.\u003c/td\u003e\n\u003ctd align=\"left\"\u003eUses the TCP/IP stack (Modbus over Ethernet).\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd align=\"left\"\u003eAddressing\u003c/td\u003e\n\u003ctd align=\"left\"\u003eUses a \u003cstrong\u003eSlave Address\u003c/strong\u003e field directly in the frame.\u003c/td\u003e\n\u003ctd align=\"left\"\u003eUses \u003cstrong\u003eIP Address\u003c/strong\u003e for routing + a \u003cstrong\u003eUnit ID\u003c/strong\u003e field in the header.\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd align=\"left\"\u003eError Check\u003c/td\u003e\n\u003ctd align=\"left\"\u003eUses a dedicated \u003cstrong\u003eCRC\u003c/strong\u003e (Cyclic Redundancy Check) at the end of the frame.\u003c/td\u003e\n\u003ctd align=\"left\"\u003eRelies on the \u003cstrong\u003eTCP/IP stack\u0026#39;s built-in checksums\u003c/strong\u003e.\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd align=\"left\"\u003eKey Purpose\u003c/td\u003e\n\u003ctd align=\"left\"\u003eLegacy systems, device-level communication, simple bus topology.\u003c/td\u003e\n\u003ctd align=\"left\"\u003eHigh-speed data transfer, integration with modern IT networks.\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\u003c/table\u003e\n\u003chr\u003e\n\u003ch3 id=\"the-tcpip-differentiator-transaction-id\"\u003eThe TCP/IP Differentiator: Transaction ID\u003c/h3\u003e\n\u003cp\u003eModbus TCP adds an \u003cstrong\u003eMBAP Header\u003c/strong\u003e (Modbus Application Protocol Header) before the core message. The most important field in this header is the \u003cstrong\u003eTransaction ID\u003c/strong\u003e (2 bytes).\u003c/p\u003e\n\u003cp\u003eThis ID is used to \u003cstrong\u003ematch asynchronous requests with their responses\u003c/strong\u003e. If a client sends three requests quickly, the server\u0026#39;s responses might arrive out of order, but the client uses the Transaction ID to correctly pair the incoming data to the original query.\u003c/p\u003e\n\u003ch2 id=\"the-modbus-data-model-four-key-tables\"\u003eThe Modbus Data Model: Four Key Tables\u003c/h2\u003e\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eData Type\u003c/th\u003e\n\u003cth\u003eAccess\u003c/th\u003e\n\u003cth\u003eSize\u003c/th\u003e\n\u003cth\u003ePurpose (What it Measures)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\u003ctr\u003e\n\u003ctd\u003eDiscrete Input\u003c/td\u003e\n\u003ctd\u003eRead-Only (R)\u003c/td\u003e\n\u003ctd\u003e1 Bit (ON/OFF)\u003c/td\u003e\n\u003ctd\u003eReading the status of a physical input (e.g., whether a safety switch is closed).\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eCoil (Discrete Output)\u003c/td\u003e\n\u003ctd\u003eRead/Write (R/W)\u003c/td\u003e\n\u003ctd\u003e1 Bit (ON/OFF)\u003c/td\u003e\n\u003ctd\u003eReading or controlling the state of a physical output (e.g., turning a light or relay ON/OFF).\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eInput Register\u003c/td\u003e\n\u003ctd\u003eRead-Only (R)\u003c/td\u003e\n\u003ctd\u003e16 Bits (Word)\u003c/td\u003e\n\u003ctd\u003eReading measured values (e.g., the current temperature reading from a sensor).\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eHolding Register\u003c/td\u003e\n\u003ctd\u003eRead/Write (R/W)\u003c/td\u003e\n\u003ctd\u003e16 Bits (Word)\u003c/td\u003e\n\u003ctd\u003eReading or writing configuration settings (e.g., setting a temperature setpoint or a control gain).\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\u003c/table\u003e\n\u003cp\u003eEvery Modbus communication relies on two core data structures: the PDU and the ADU.\u003c/p\u003e\n\u003ch3 id=\"pdu-protocol-data-unit\"\u003ePDU (Protocol Data Unit)\u003c/h3\u003e\n\u003cp\u003eThe PDU is the \u003cstrong\u003ecore message content\u003c/strong\u003e, independent of the physical communication method.\u003cbr\u003e$$PDU = Function Code + Data$$\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eFunction Code (1 Byte):\u003c/strong\u003e This is the command. It tells the server \u003cem\u003ewhat\u003c/em\u003e to do. Examples include 0x01 (Read Coils) or 0x03 (Read Holding Registers). If the server encounters an error, it responds with an \u003cstrong\u003eException Function Code\u003c/strong\u003e (Original Code + 0x80) plus an Exception Code explaining the error.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eData:\u003c/strong\u003e Includes the \u003cstrong\u003eStarting Address\u003c/strong\u003e (where to start the operation, 2 bytes) and the \u003cstrong\u003eQuantity\u003c/strong\u003e (how many items to read/write).\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"adu-application-data-unit\"\u003eADU (Application Data Unit)\u003c/h3\u003e\n\u003cp\u003eThe ADU is the \u003cstrong\u003ecomplete, transmitted frame\u003c/strong\u003e that wraps the PDU with transport-specific fields.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eModbus RTU ADU\u003c/strong\u003e: $Slave Address + PDU + CRC$\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSlave Address (1 byte)\u003c/strong\u003e: Identifies the specific server (slave) device on the serial line that the client (master) wants to communicate with. This is the device\u0026#39;s unique physical address on the bus. \u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePDU (Up to 253 bytes)\u003c/strong\u003e: \u003cstrong\u003eProtocol Data Unit\u003c/strong\u003e (Function Code + Data). This is the core instruction or response, which is identical in both RTU and TCP versions.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCRC (2 bytes)\u003c/strong\u003e: \u003cstrong\u003eCyclic Redundancy Check\u003c/strong\u003e. This is a dedicated checksum used for robust \u003cstrong\u003eerror checking\u003c/strong\u003e. The receiving device calculates the CRC for the incoming data and compares it to the received CRC value to ensure data integrity.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eModbus TPC ADU\u003c/strong\u003e: $MBAP Header + Unit ID + PDU$\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMBAP Header (6 bytes)\u003c/strong\u003e: \u003cstrong\u003eModbus Application Protocol Header\u003c/strong\u003e. This header is essential for network communication and is broken down into three fields:\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTransaction ID (2 bytes)\u003c/strong\u003e: A sequential tag used by the client to \u003cstrong\u003ematch requests to their corresponding responses\u003c/strong\u003e when they arrive.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eProtocol ID (2 bytes)\u003c/strong\u003e: Always 0x0000, identifying the Modbus protocol.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLength (2 bytes)\u003c/strong\u003e: Specifies the number of bytes that follow in the rest of the frame (Unit ID + PDU).\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUnit ID (1 byte)\u003c/strong\u003e: Used to \u003cstrong\u003eidentify the specific device\u003c/strong\u003e when Modbus TCP is used to talk to an RTU network through a gateway. It acts as the slave address on the internal serial segment.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePDU (Up to 253 bytes)\u003c/strong\u003e: \u003cstrong\u003eProtocol Data Unit\u003c/strong\u003e (Function Code + Data). This is the core instruction or response, identical to the RTU version.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe \u003cstrong\u003eADU\u003c/strong\u003e is what the client actually constructs and sends, and it carries the PDU across the wire to complete the transaction.\u003c/p\u003e\n\u003ch2 id=\"references\"\u003eReferences\u003c/h2\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://en.wikipedia.org/wiki/Modbus\"\u003ehttps://en.wikipedia.org/wiki/Modbus\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=txi2p5_OjKU\"\u003ehttps://www.youtube.com/watch?v=txi2p5_OjKU\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=JBGaInI-TG4\"\u003ehttps://www.youtube.com/watch?v=JBGaInI-TG4\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.youtube.com/watch?v=nlFM1q9QPJw\"\u003ehttps://www.youtube.com/watch?v=nlFM1q9QPJw\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n"])</script><script>self.__next_f.push([1,"5:[[\"$\",\"$Ld\",null,{}],[\"$\",\"$Le\",null,{\"id\":\"MathJax-config\",\"strategy\":\"beforeInteractive\",\"children\":\"\\n            window.MathJax = {\\n              tex: {\\n                inlineMath: [['$', '$'], ['\\\\(', '\\\\)']],\\n                displayMath: [['$$', '$$'], ['\\\\[', '\\\\]']],\\n              },\\n              svg: {\\n                fontCache: 'global'\\n              }\\n            };\\n          \"}],[\"$\",\"$Le\",null,{\"type\":\"text/javascript\",\"id\":\"MathJax-script\",\"async\":true,\"src\":\"https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js\"}],[\"$\",\"div\",null,{\"className\":\"container mx-auto px-4 py-8\",\"children\":[\"$\",\"article\",null,{\"className\":\"max-w-3xl mx-auto break-words hyphens-auto\",\"children\":[[\"$\",\"div\",null,{\"className\":\"bg-yellow-500 text-black px-4 py-2 mb-4 rounded\",\"children\":\"This is a draft post\"}],[\"$\",\"header\",null,{\"className\":\"mb-8\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"text-3xl md:text-4xl font-bold text-white mb-2\",\"children\":\"Modbus protocol\"}],[\"$\",\"p\",null,{\"cla
