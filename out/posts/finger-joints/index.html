=\"/images/Pasted%20image%2020250630204928.png\" alt=\"\"\u003e\u003cbr\u003ethis is a very simple design of an empty box, but when we are working with something more complex these simple tools lack behind and can\u0026#39;t be used let\u0026#39;s see a simple example of a design that can\u0026#39;t be done with simple tools like \u003ca href=\"https://www.makercase.com/#/basicbox\"\u003eMakerCase\u003c/a\u003e \u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/images/Pasted%20image%2020250630210345.png\" alt=\"\"\u003e\u003c/p\u003e\n\u003cp\u003enow after we knew why we are learning how to design in solidworks and not using websites let\u0026#39;s check out the tools we need to do it \u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eSOILDWORKS\u003c/li\u003e\n\u003cli\u003eFUSION\u003c/li\u003e\n\u003cli\u003eLaser Cutter machine\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003enow let\u0026#39;s open SOILDWORKS and create a new part \u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/images/ezgif-37bd616df402e3.gif\" alt=\"\"\u003e\u003c/p\u003e\n\u003cp\u003enow we have to go to the sheet metal section to do that we firstly have to make the sheet metal tap appear in the bar to do this we have to right click the bar and select taps and enable the sheet metal in this way we enabled the sheet metal option, we have to do this ones and any time after that it we be enabled, here is a screen shot \u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/images/ezgif-3fd3a6acb60cce.gif\" alt=\"\"\u003e\u003c/p\u003e\n\u003cp\u003eok now we have to make a design to make simple to learn i will teach you a simple male female part and then I\u0026#39;ll make a design and we will continue the tutorial on it, so now let\u0026#39;s create a simple male female joint \u003c/p\u003e\n\u003cp\u003ecreate a new sketch with a 20cm diameter circle, and then go to the sheet metal tap and select \u0026quot;Base Flange/Tab\u0026quot; option and after that you have to select the thickness of the part in this case 3mm = 0.3cm and click ok the green done icon, now u have a circle 20cm in diameter and 3mm in thickness \u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/images/ezgif-3dd7b4ecf2fe59.gif\" alt=\"\"\u003e\u003c/p\u003e\n\u003cp\u003enow we are going to make a plate to be perpendicular on top of the one we already did, we create a construction line in the center line of the circle and then create a new line that offsets the center line we already created by 1.5mm witch is half of the thinness of the sheet, after that we go to the metal sheet tap and select the \u0026quot;Base Flange/Tab\u0026quot; option and select a dirction of 10cm and also i revesred the direction under the \u0026quot;Sheet Metal Parameters\u0026quot; i did that cuz when it wasn\u0026#39;t revesed the plane would go uncentered \u003c/p\u003e\n\u003cp\u003e\u003cimg src=\"/images/ezgif-3886fe52de6109.gif\" alt=\"\"\u003e\u003c/p\u003e\n\u003cp\u003ehere is an image explaining the revers direction thing i was talking about\u003cbr\u003e\u003cimg src=\"/images/Pasted%20image%2020250630221542.png\" alt=\"\"\u003e\u003c/p\u003e\n\u003cp\u003eok now the fun part creating the joints\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"5:[[\"$\",\"$Ld\",null,{}],[\"$\",\"$Le\",null,{\"id\":\"MathJax-config\",\"strategy\":\"beforeInteractive\",\"children\":\"\\n            window.MathJax = {\\n              tex: {\\n                inlineMath: [['$', '$'], ['\\\\(', '\\\\)']],\\n                displayMath: [['$$', '$$'], ['\\\\[', '\\\\]']],\\n              },\\n              svg: {\\n                fontCache: 'global'\\n              }\\n            };\\n          \"}],[\"$\",\"$Le\",null,{\"type\":\"text/javascript\",\"id\":\"MathJax-script\",\"async\":true,\"src\":\"https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js\"}],[\"$\",\"div\",null,{\"className\":\"container mx-auto px-4 py-8\",\"children\":[\"$\",\"article\",null,{\"className\":\"max-w-3xl mx-auto break-words hyphens-auto\",\"children\":
